<!doctype html>
<html lang="PT-BR">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, shrink-to-fit=no"
		/>
		<title>Lyam portfólio</title>

		<!--? ==================== CDN ==================== -->
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
			integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous"
		></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!--? ==================== OUTROS ==================== -->
		<link rel="stylesheet" href="styles/style.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Bagel+Fat+One&family=Delius&display=swap"
			rel="stylesheet"
		/>
		<link rel="icon" type="image/png" sizes="32x32" href="img/siteIcon.png" />
	</head>

	<body>
		<!--? ==================== HEADER ==================== -->
		<div id="header-container" class="container">
			<header class="row">
				<a
					class="fs-4 col-6 logo redish-text"
					href="#home"
					onclick="trocarMain('home')"
				>
					<img
						height="35px"
						width="35px"
						src="img/siteIcon.png"
						alt="Assinatura da Lyam como logo do portfólio"
				/></a>
				<nav class="col-6" role="navigation">
					<ul class="nav justify-content-end">
						<li class="nav-item">
							<select id="language-switcher">
								<option value="en" selected>English</option>
								<option value="pt-br">Português</option>
							</select>
						</li>
						<li class="nav-item">
							<a
								class="fs-4 nav-link redish-text"
								target="_blank"
								rel="noopener noreferrer"
								aria-label="LinkedIn de Lyam Santos Peres"
								href="https://www.linkedin.com/in/karine-santos-peres/"
							>
								<i class="fa-brands fa-linkedin-in"></i>
							</a>
						</li>
						<li class="nav-item">
							<a
								class="fs-4 nav-link redish-text"
								target="_blank"
								rel="noopener noreferrer"
								aria-label="Enviar e-mail para Lyam Santos Peres"
								href="https://mail.google.com/mail/?view=cm&to=karinesanper@gmail.com&su=Contate%20Lyam&body=Eu%20vi%20seu%20portfólio."
								><i class="fa-solid fa-envelope"></i
							></a>
						</li>
					</ul>
				</nav>
			</header>
		</div>
		<!--? ==================== SCREEN 1 - INDEX ==================== -->
		<main id="home" class="container w-100">
			<article id="intro" class="row align-items-center h-80vh">
				<section id="greet">
					<div
						class="rounded-circle text-center d-flex flex-column align-items-center justify-content-center index-circle"
					>
						<h1 id="nome-intro" class="lang-pt-br" style="display: none">
							Aqui é a Lyam!
						</h1>
						<h2 class="lang-pt-br" style="display: none">Game e Web Dev</h2>

						<h1 id="nome-intro" class="lang-en">Hi, I'm Lyam!</h1>
						<h2 class="lang-en">Game and Web Dev</h2>
					</div>
				</section>
				<section
					class="buttons d-flex gap-3 flex-wrap justify-content-center mt-5 mb-3"
				>
					<a
					class="page-control lang-pt-br btn redish-text redish-border-1px btn-responsive rounded-start-5 me-2"
					style="display: none"
					href="/pages/about.html"
				>
					Sobre
				</a>
				<a
					class="page-control lang-pt-br btn redish-text redish-border-1px btn-responsive rounded-end-5 ms-2"
					style="display: none"
					href="/pages/projects.html"
				>
					Projetos
				</a>
				<a
					class="page-control lang-en btn redish-text redish-border-1px btn-responsive rounded-start-5 me-2"
					href="/pages/about.html"
				>
					About
				</a>
				<a
					class="page-control lang-en btn redish-text redish-border-1px btn-responsive rounded-end-5 ms-2"
					href="/pages/projects.html"
				>
					Projects
				</a>
				</section>
			</article>
		</main>
		<!--? ==================== FOOTER ==================== -->
		<footer class="text-center">
			<address class="lang-pt-br redish-text" style="display: none">
				Portfólio por © Lyamoe <br />
				Entre em contato!
			</address>
			<address class="lang-en redish-text">
				Portfolio by © Lyamoe <br />
				Contact me!
			</address>
		</footer>
		<!--? ==================== SCRIPTS ==================== -->
		<script src="/scripts/setLanguage.js"></script>
	</body>
</html>

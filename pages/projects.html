			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"

		></script>

		<!--? ==================== OUTROS ==================== -->

		<link
			href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Bagel+Fat+One&family=Delius&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"

		/>
	</head>

	<body>
		<!--? ==================== HEADER ==================== -->
		<div id="header-container" class="container">
			<header class="row">
				<a class="fs-4 col-6 logo redish-text" href="../index.html">
					<img
						height="35px"
						width="35px"
						src="../img/siteIcon.png"
						alt="Assinatura da Lyam como logo do portfólio"
				/></a>
				<nav class="col-6" role="navigation">
					<ul class="nav justify-content-end">
						<li class="nav-item">
							<select id="language-switcher">
								<option value="en" selected>English</option>
								<option value="pt-br">Português</option>
							</select>
						</li>
						<li class="nav-item">
							<a
								class="fs-4 nav-link redish-text"
								target="_blank"
								rel="noopener noreferrer"
								aria-label="LinkedIn de Lyam Santos Peres"
								href="https://www.linkedin.com/in/karine-santos-peres/"
							>
								<i class="fa-brands fa-linkedin-in"></i>
							</a>
						</li>
						<li class="nav-item">
							<a
								class="fs-4 nav-link redish-text"
								target="_blank"
								rel="noopener noreferrer"
								aria-label="Enviar e-mail para Lyam Santos Peres"
								href="https://mail.google.com/mail/?view=cm&to=karinesanper@gmail.com&su=Contate%20Lyam&body=Eu%20vi%20seu%20portfólio."
								><i class="fa-solid fa-envelope"></i
							></a>
						</li>
					</ul>
				</nav>
			</header>
		</div>
		<!--? ==================== SCREEN 3 - PROJECTS ==================== -->
		<main id="projects" class="container w-100">
			<article id="geral-projects" class="row">
				<section id="cards-projects">
					<h1 class="lang-pt-br" style="display: none">Projetos</h1>
					<h1 class="lang-en">Projects</h1>
					<hr class="redish-border-1px" />
					<div class="container">
						<div
							id="card-group"
							class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
						>
							<!-- Cards will be dynamically inserted here -->
						</div>
					</div>
				</section>
				<section
					class="buttons d-flex gap-3 flex-wrap justify-content-center mt-5 mb-3"
				>
					<a
						class="page-control lang-pt-br btn redish-text redish-border-1px btn-responsive rounded-start-5 me-2"
						style="display: none"
						href="../index.html"
					>
						Inicio
					</a>
					<a
						class="page-control lang-pt-br btn redish-text redish-border-1px btn-responsive rounded-end-5 ms-2"
						style="display: none"
						href="about.html"
					>
						Sobre
					</a>
					<a
						class="page-control lang-en btn redish-text redish-border-1px btn-responsive rounded-start-5 me-2"
						href="../index.html"
					>
						Home
					</a>
					<a
						class="page-control lang-en btn redish-text redish-border-1px btn-responsive rounded-end-5 ms-2"
						href="about.html"
					>
						About
					</a>
				</section>
			</article>
		</main>
		<!--? ==================== FOOTER ==================== -->
		<footer class="text-center">
			<address class="lang-pt-br redish-text" style="display: none">
				Portfólio por © Lyamoe <br />
				Entre em contato!
			</address>
			<address class="lang-en redish-text">
				Portfolio by © Lyamoe <br />
				Contact me!
			</address>
		</footer>
		<!--? ==================== SCRIPTS ==================== -->
		<script src="/scripts/setLanguage.js"></script>

		<script>
			async function loadProjects() {
				try {
					const response = await fetch("../data/projects.json");
					if (!response.ok) {
						throw new Error(`HTTP error! status: ${response.status}`);
					}

					const data = await response.json();
					const container = document.getElementById("card-group");

					const sortedProjects = data.projects.sort((a, b) => {
						return new Date(b["release-date"]) - new Date(a["release-date"]);
					});

					const cardsHTML = sortedProjects
						.map((project) => {
							return `
                    <a class="project-card col" href="${project["link"]}" target="_blank">
                        <div class="card flex-fill">
                            <img
                                src="${project["banner-image"]}"
                                class="card-img-top object-fit-cover max-h-25vh"
                                style="max-height: 50vh"
                                alt="${project["banner-image-alt"] || "Project image"}"
                            />
                            <div class="card-body">
                                <h2 class="card-title fs-5 fs-md-4">${project.name}</h2>
                                <p class="lang-pt-br text-muted small" style="display: none">
                                    Lançamento: ${project["release-date"]}
                                </p>
                                <p class="lang-en text-muted small">
                                    Released: ${project["release-date"]}
                                </p>
                                <p
                                    class="lang-pt-br card-text fs-6 fs-md-5"
                                    style="display: none"
                                >
                                    ${project["description-pt-br"]}
                                </p>
                                <p class="lang-en card-text fs-6 fs-md-5">
                                    ${project["description-en"]}
                                </p>
                            </div>
                        </div>
                    </a>
                `;
						})
						.join("");

					container.innerHTML = cardsHTML;

					if (typeof setLanguage === "function") {
						setLanguage(currentLang);
					}
				} catch (error) {
					console.error("Could not load projects:", error);
				}
			}

			document.addEventListener("DOMContentLoaded", loadProjects);
		</script>
	</body>
</html>
